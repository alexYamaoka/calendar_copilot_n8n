<svg viewBox="0 0 960 560" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b949e"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="960" height="560" rx="12" fill="#0d1117"/>

  <!-- title -->
  <text x="480" y="44" text-anchor="middle" fill="#e6edf3" font-size="22" font-weight="700">Calendar Copilot — System Architecture</text>
  <text x="480" y="68" text-anchor="middle" fill="#8b949e" font-size="13">Discord chat interface · n8n orchestration · Claude NLU · Google Calendar + Sheets</text>

  <!-- Discord (left) -->
  <rect x="40" y="220" width="180" height="120" rx="10" fill="#161b22" stroke="#5865F2" stroke-width="2"/>
  <text x="130" y="262" text-anchor="middle" fill="#e6edf3" font-size="17" font-weight="600">Discord</text>
  <text x="130" y="286" text-anchor="middle" fill="#8b949e" font-size="12">chat interface</text>
  <text x="130" y="306" text-anchor="middle" fill="#8b949e" font-size="12">briefings · check-ins · replies</text>

  <!-- n8n (center) -->
  <rect x="330" y="130" width="300" height="300" rx="10" fill="#161b22" stroke="#ea4b71" stroke-width="2"/>
  <text x="480" y="164" text-anchor="middle" fill="#e6edf3" font-size="17" font-weight="600">n8n (Docker)</text>
  <text x="480" y="184" text-anchor="middle" fill="#8b949e" font-size="12">5 scheduled workflows</text>

  <rect x="350" y="200" width="260" height="36" rx="6" fill="#21262d"/>
  <text x="480" y="223" text-anchor="middle" fill="#c9d1d9" font-size="12.5">1 · Morning Briefing — daily 8 AM</text>

  <rect x="350" y="244" width="260" height="36" rx="6" fill="#21262d"/>
  <text x="480" y="267" text-anchor="middle" fill="#c9d1d9" font-size="12.5">2 · Event Check-in Poller — every 30 min</text>

  <rect x="350" y="288" width="260" height="36" rx="6" fill="#21262d"/>
  <text x="480" y="311" text-anchor="middle" fill="#c9d1d9" font-size="12.5">3 · Reply Handler — every 2 min</text>

  <rect x="350" y="332" width="260" height="36" rx="6" fill="#21262d"/>
  <text x="480" y="355" text-anchor="middle" fill="#c9d1d9" font-size="12.5">4 · Natural Language Handler — every 2 min</text>

  <rect x="350" y="376" width="260" height="36" rx="6" fill="#21262d"/>
  <text x="480" y="399" text-anchor="middle" fill="#c9d1d9" font-size="12.5">5 · URL Saver — daily 7 PM</text>

  <!-- Claude (top right) -->
  <rect x="740" y="110" width="180" height="100" rx="10" fill="#161b22" stroke="#d97757" stroke-width="2"/>
  <text x="830" y="148" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="600">Claude Haiku 4.5</text>
  <text x="830" y="170" text-anchor="middle" fill="#8b949e" font-size="12">intent classification</text>
  <text x="830" y="188" text-anchor="middle" fill="#8b949e" font-size="12">date parsing · formatting</text>

  <!-- Google Calendar (mid right) -->
  <rect x="740" y="240" width="180" height="90" rx="10" fill="#161b22" stroke="#4285F4" stroke-width="2"/>
  <text x="830" y="276" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="600">Google Calendar</text>
  <text x="830" y="298" text-anchor="middle" fill="#8b949e" font-size="12">events · CRUD · annotations</text>

  <!-- Google Sheets (bottom right) -->
  <rect x="740" y="360" width="180" height="100" rx="10" fill="#161b22" stroke="#34A853" stroke-width="2"/>
  <text x="830" y="396" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="600">Google Sheets</text>
  <text x="830" y="418" text-anchor="middle" fill="#8b949e" font-size="12">event_tracker state machine</text>
  <text x="830" y="436" text-anchor="middle" fill="#8b949e" font-size="12">app_state · saved URLs</text>

  <!-- arrows Discord <-> n8n -->
  <line x1="220" y1="260" x2="330" y2="260" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="330" y1="300" x2="220" y2="300" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="275" y="248" text-anchor="middle" fill="#8b949e" font-size="11">messages</text>
  <text x="275" y="318" text-anchor="middle" fill="#8b949e" font-size="11">bot replies</text>

  <!-- arrows n8n <-> Claude -->
  <line x1="630" y1="200" x2="740" y2="160" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <!-- arrows n8n <-> Calendar -->
  <line x1="630" y1="285" x2="740" y2="285" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <!-- arrows n8n <-> Sheets -->
  <line x1="630" y1="370" x2="740" y2="410" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
</svg>
